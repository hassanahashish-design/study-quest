 "To disrupt the structured figure while controlling low-level motion", "To add color", "To speed up the display"], "a": 1, "e": "Keeping trajectories intact means the scrambled control <b>disrupts the structured motion</b> (the coherent figure) while holding low-level motion energy roughly constant — a clean control."}}, {"d": 2, "q": "In the composite display, how did the individual animations change with eccentricity?", "o": ["They shrank toward the edge", "They increased in size with eccentricity", "They stayed the same size", "They vanished in the periphery"], "a": 1, "n": "Both the wedge and the background contained point-light animations that increased in size with eccentricity.", "w": {"q": "How many individual point-light animations populated the full circular display?", "o": ["3", "11", "18", "55"], "a": 2, "e": "The composite stimulus was a circular area populated with <b>18</b> individual point-light animations, roughly 55 degrees of visual angle in diameter."}}, {"d": 3, "q": "The higher retinotopic areas identified were found to be:", "o": ["Specific to biological motion only", "Only active for faces", "Inactive to any motion", "Not specific to biological motion (also driven by nonbiological point-light motion)"], "a": 3, "n": "A control variant with nonbiologically moving point-light objects activated the same higher areas similarly, so the maps were not specific to biological motion.", "tip": "Biological motion revealed the maps, but the maps themselves weren't picky about biological vs nonbiological.", "w": {"q": "How does the nonbiological-motion result fit the study's main thesis?", "o": ["It contradicts it", "It fits: higher areas are primarily attention-driven, not tied to a specific stimulus", "It proves V1 is attention-driven", "It shows maps need faces"], "a": 1, "e": "The lack of biological-motion specificity is <b>consistent with higher areas being primarily attention-driven</b> rather than locked to one stimulus type."}}]}, {"id": "U4S3", "u": "U4", "ico": "🌀", "name": "Phase-Encoded Mapping", "qs": [{"d": 1, "q": "In phase-encoded polar-angle mapping, subjects fixate and view a:", "o": ["Rotating pie-shaped wedge", "Static grid", "Blinking dot", "Expanding ring only"], "a": 0, "n": "Subjects fixate and view a clockwise or counterclockwise rotating pie-shaped 'wedge' whose position sweeps through polar angles.", "tip": "Polar angle = the clock-hand direction; a rotating wedge sweeps all directions.", "w": {"q": "What analysis extracts an amplitude and phase at each voxel?", "o": ["A t-test", "A Fourier analysis at the stimulus frequency", "Simple averaging", "Principal component analysis"], "a": 1, "e": "Each subject's data were analyzed with a <b>Fourier analysis</b>, yielding an amplitude and a phase at each voxel; phase encodes the preferred polar-angle location."}}, {"d": 2, "q": "Why did the authors choose polar-angle mapping over eccentricity mapping?", "o": ["Eccentricity is impossible with fMRI", "Eccentricity was hard to adapt to their stimulus-vs-attention design (foveal perception/attention is better than peripheral)", "Polar angle needs no fixation", "Eccentricity maps only V1"], "a": 1, "n": "Eccentricity mapping was difficult to adapt to the design because perception and attention are better in the fovea than periphery, even after correcting for cortical magnification.", "w": {"q": "Running clockwise AND counterclockwise scans lets them do what?", "o": ["Double the sample size", "Cancel phase errors from local hemodynamic delay by combining opposite directions", "Test color vision", "Map eccentricity"], "a": 1, "e": "Combining opposite rotation directions <b>cancels phase errors due to local static differences in hemodynamic delay</b>, and confirms that reversing rotation reverses the phase map."}}, {"d": 2, "q": "One key advantage of phase encoding over sampling a few locations is that it:", "o": ["Uses fewer subjects", "Gives a high signal-to-noise mapping of the entire visual field", "Requires no fixation", "Only works in frontal cortex"], "a": 1, "n": "Phase encoding provides a high signal-to-noise mapping of the entire visual field, complementing prior attention work that sampled few locations.", "tip": "Phase encoding = map the WHOLE field continuously, not a handful of spots.", "w": {"q": "How does phase encoding help minimize 'surround' effects?", "o": ["By using color", "Because every condition is Fourier analyzed within itself", "By removing the background", "By shortening scans"], "a": 1, "e": "Surround effects are minimized because <b>every condition is Fourier analyzed within itself</b>, and stimulus/task stay constant throughout a session, avoiding task/set-shifting confounds."}}, {"d": 3, "q": "In the group analysis, a significant cortical patch on the average map indicates:", "o": ["Random noise", "A strong response at the stimulus frequency AND consistent phase across subjects", "Only high blood flow", "Ipsilateral responses"], "a": 1, "n": "Significant patches in average maps have strong responses at the stimulus frequency and consistent phase across subjects, indicating a strong, highly consistent retinotopic representation.", "w": {"q": "Why is the amplitude called 'signed' in the voxel-wise analysis?", "o": ["To mark statistical error", "Positive or negative depending on contralateral vs ipsilateral phase", "To indicate scan order", "To flag motion artifacts"], "a": 1, "e": "The <b>signed amplitude</b> is positive or negative depending on whether the phase corresponds to <b>contralateral or ipsilateral</b> space — a quantitative measure of contralateral representation strength."}}]}, {"id": "U4S4", "u": "U4", "ico": "🧭", "name": "Cortical Areas Mapped", "qs": [{"d": 1, "q": "The retinotopic activity near the superior precentral sulcus corresponded to which frontal region?", "o": ["Broca's area", "The frontal eye fields (FEF)", "Motor cortex hand area", "Orbitofrontal cortex"], "a": 1, "n": "Well-defined bilateral retinotopic activity in the superior precentral sulcus corresponded to the frontal eye fields (FEF).", "tip": "FEF = frontal eye fields, in the precentral sulcus — the frontal end of the map chain.", "w": {"q": "What is notable about FEF retinotopy in this study?", "o": ["It exists only in monkeys", "The human FEF exhibits retinotopy that can be driven by attention alone", "It requires eye movement", "It disappears with attention"], "a": 1, "e": "The study shows the human <b>FEF exhibits retinotopy that can be driven by attention alone</b>, without an explicit eye movement or stimulus contrast."}}, {"d": 2, "q": "Extensive retinotopy in lateral temporal cortex covered LOC and MT+ and extended into which structure?", "o": ["The corpus callosum", "The superior temporal sulcus (STS)", "The hippocampus", "The insula"], "a": 1, "n": "Retinotopic responses covered lateral occipital cortex (LOC) and MT+/MST and reached into the superior temporal sulcus (STS), especially in the left hemisphere.", "tip": "Motion-sensitive stream: LOC to MT+ to STS along lateral temporal cortex.", "w": {"q": "Why is temporal retinotopy extending beyond MT notable versus monkeys?", "o": ["Monkeys have more of it", "Areas beyond MT show little or no retinotopy in monkeys, unlike this human data", "It is identical across species", "Monkeys lack MT"], "a": 1, "e": "In contrast to the human data, <b>areas beyond MT show little or no retinotopy in monkeys</b> — a possible cross-species difference or an effect of stimuli/phase-encoded mapping."}}, {"d": 2, "q": "Along and around the intraparietal sulcus (IPS), the continuous activity contained:", "o": ["A single uniform field", "Several phase reversals indicating multiple areas (e.g., IPS1, IPS2)", "No phase information", "Only ipsilateral responses"], "a": 1, "n": "A large continuous region along the IPS contained several phase reversals indicating multiple areas, covering V3A, V7, IPS1, IPS2 and beyond.", "tip": "Phase reversals = borders between adjacent maps; multiple reversals = multiple IPS areas.", "w": {"q": "Which recently described areas lie anterior/lateral to IPS2 and were less consistent?", "o": ["V1 and V2", "IPS3, IPS4, and VIP", "FFA and PPA", "A1 and A2"], "a": 1, "e": "The most recently discovered parietal regions <b>IPS3, IPS4, and ventral intraparietal area (VIP)</b> were less consistent across subjects and were not marked in the figures."}}, {"d": 3, "q": "In the medial view, a retinotopic area at the border of V3/V3A most likely corresponded to:", "o": ["Human V6", "The FEF", "The FFA", "The amygdala"], "a": 0, "n": "A retinotopic area at the medial border of V3 and V3A most likely corresponded to human V6, which shows contralateral retinotopy with wide-field stimuli.", "tip": "V6 lives on the parieto-occipital sulcus and likes wide-field stimuli.", "w": {"q": "The precuneus activation overlapped a region that may correspond to which functional area?", "o": ["Broca's area", "The parietal reach region (PRR)", "The FFA", "Primary auditory cortex"], "a": 1, "e": "The precuneus activation overlapped the location of the <b>parietal reach region (PRR)</b>, though the study did not run functional tests to localize the PRR."}}, {"d": 3, "q": "In ventral (inferotemporal) cortex, retinotopic activity covered V4+ and, in individual cases, overlapped with:", "o": ["The FEF", "The fusiform face area (FFA)", "V1", "The precuneus"], "a": 1, "n": "Ventral retinotopic activation covered V4+ and extended anteriorly, overlapping with the functionally mapped FFA in individual subjects.", "w": {"q": "What drove inferotemporal cortex in the study?", "o": ["Only attention", "Only stimulus", "Both attentional modulation and stimulus-driven activity", "Neither"], "a": 2, "e": "Inferotemporal cortex exhibited <b>both attentional modulation and stimulus-driven activity</b>, a mix consistent with its intermediate position in the hierarchy."}}]}, {"id": "U4S5", "u": "U4", "ico": "🎯", "name": "Attention vs Stimulus Findings", "qs": [{"d": 1, "q": "In the 'Stimulus' condition, what task kept attention away from the wedge?", "o": ["Counting the figures", "A 2-back working-memory task on the fixation cross color", "Naming the actions", "Pressing a button every second"], "a": 1, "n": "In the Stimulus condition subjects ignored the periphery and performed a 2-back working-memory task with the color of the fixation cross.", "tip": "2-back at fixation = attention pinned to the center, withdrawn from the wedge.", "w": {"q": "Why was the demanding central 2-back task chosen?", "o": ["It is easy and relaxing", "It is attention-demanding, alters the stimulus minimally, centrally, and non-periodically", "It moves the eyes", "It matches the wedge frequency"], "a": 1, "e": "The 2-back task was <b>attention-demanding yet altered the display minimally, centrally, and non-periodically</b>, allowing an attention contrast while keeping the retinotopic stimulus identical."}}, {"d": 2, "q": "Which areas were primarily STIMULUS-driven (the Stimulus effect in the ANOVA)?", "o": ["FEF and posterior parietal cortex", "Early areas V1, V2, V3, VP, and V3A", "STS and precuneus", "IPS3 and IPS4"], "a": 1, "n": "The Stimulus effect was found mainly in earlier areas V1, V2, V3, VP, and V3A.", "tip": "Early = stimulus-driven; the retina's photograph, not the spotlight of attention.", "w": {"q": "Which areas showed the strongest ATTENTION effects?", "o": ["V1 and V2", "Posterior parietal cortex, the FEF, and lateral/ventral temporal cortex", "The cerebellum", "Auditory cortex"], "a": 1, "e": "Highly significant <b>Attention effects</b> were found in posterior parietal cortex (especially right hemisphere), the <b>FEF</b>, and lateral and ventral temporal cortex."}}, {"d": 3, "q": "In the Attention condition (biological motion in both wedge and background), primary visual cortex (V1):", "o": ["Showed a strong, well-defined map", "Did NOT respond with a well-defined retinotopic map (no stimulus contrast)", "Reversed its phase", "Mapped the ipsilateral field"], "a": 1, "n": "With no stimulus contrast between wedge and background, V1 did not produce a well-defined retinotopic map, even though subjects attended the wedge.", "tip": "No contrast to see = no V1 map; V1 needs a stimulus difference, not just attention.", "w": {"q": "Why is V1's map thought to depend on the wedge/background difference?", "o": ["V1 prefers faces", "V1 isn't known to prefer biological motion or structure-from-motion, so the map reflects the perceived contrast", "V1 has no receptive fields", "V1 only codes color"], "a": 1, "e": "V1 does not prefer structure-from-motion or biological motion (and may even favor unstructured motion), so its map likely reflects the <b>perceived difference between wedge and background</b> rather than the wedge's contents."}}, {"d": 2, "q": "Which region stayed most active even when attention was withdrawn from the stimuli?", "o": ["The FEF", "The MT+ region (motion-sensitive lateral temporal cortex)", "V6", "Posterior parietal cortex"], "a": 1, "n": "Areas in the vicinity of MT+ were the most resistant to attention withdrawal, remaining active in the Stimulus condition; motion-sensitive cortex represents the stimulus even without attention.", "tip": "MT+ keeps mapping motion whether or not you attend — the stubborn motion detector.", "w": {"q": "What dual property makes motion-sensitive temporal cortex distinctive here?", "o": ["It ignores stimuli entirely", "It shows attentional modulation yet still responds when attention is directed away", "It only responds to color", "It is purely attention-driven like FEF"], "a": 1, "e": "Motion-sensitive temporal cortex is the middle ground: it shows <b>attentional modulation</b> but also <b>responds significantly when attention is directed away</b> from the retinotopic stimulus."}}, {"d": 3, "q": "What is the study's overall conclusion about retinotopic maps in higher areas?", "o": ["They are epiphenomenal byproducts", "They are not epiphenomenal and may provide infrastructure for spatial tasks like attention", "They exist only in V1", "They only reflect eye movements"], "a": 1, "n": "The authors propose that retinotopic maps in higher areas are not epiphenomenal; they actively subserve and may provide an infrastructure for spatial tasks such as attention.", "tip": "Maps aren't decoration — they're the scaffolding attention uses to move across space.", "w": {"q": "How does retinotopy change across the cortical hierarchy per the paper?", "o": ["It stays purely stimulus-driven everywhere", "It shifts in steps from primarily stimulus-driven (early) to primarily attention-driven (parietal/frontal)", "It vanishes past V1", "It becomes purely random"], "a": 1, "e": "Retinotopy changes <b>in steps from primarily stimulus-driven</b> in early visual cortex to <b>primarily attention-driven</b> in parietal and frontal regions, with motion-sensitive cortex showing both."}}]}, {"id": "U5S1", "u": "U5", "ico": "⚖️", "name": "Measurement vs Manipulation", "qs": [{"d": 1, "q": "What do measurement techniques do?", "o": ["Record brain function during a task", "Permanently damage brain tissue", "Inject drugs to change firing", "Apply magnetic pulses to the scalp"], "a": 0, "n": "Measurement techniques record changes in brain function while a participant engages in a cognitive activity.", "tip": "MEasure = MEdiate nothing, just watch.", "w": {"q": "Why are measurement techniques often called 'correlational'?", "o": ["They always give wrong results", "They only work in animals", "They show co-occurrence but not necessity", "They damage the region studied"], "a": 2, "e": "Measurement techniques can show a signal <b>co-occurs</b> with a function, but cannot show a region is <b>necessary</b> for that function."}}, {"d": 2, "q": "A researcher wants to prove a region is NECESSARY for a choice. Which class of technique fits?", "o": ["Measurement techniques", "Manipulation techniques", "Correlational imaging only", "None can address necessity"], "a": 1, "n": "Manipulation techniques perturb brain function and observe behavioral change, so they are called causal approaches.", "tip": "Manipulate = make a cause.", "w": {"q": "How do manipulation techniques change brain function?", "o": ["Only by imaging metabolism", "By transiently changing firing or permanently damaging tissue", "By measuring blood oxygen only", "By recording scalp voltages"], "a": 1, "e": "Manipulation techniques alter firing rates or neurotransmitter levels transiently, or damage tissue permanently, then observe the effect on behavior."}}, {"d": 3, "q": "Why does the chapter say measurement and manipulation are 'complementary'?", "o": ["They give identical information", "Measurement links structure to function; manipulation probes that link causally", "Both only work in humans", "Both have poor temporal resolution"], "a": 1, "n": "Research progresses when measurement establishes structure-function links and manipulation then probes those links to sharpen inferences.", "w": {"q": "What is a stated limitation of ALL measurement techniques?", "o": ["They cannot conclusively determine a causal role in behavior", "They cannot measure timing", "They can only be used in animals", "They require injecting radioactive tracers"], "a": 0, "e": "A common disadvantage of every measurement technique is that it <b>cannot conclusively determine the causal role</b> of the identified neural computations in behavior."}}, {"d": 1, "q": "Which three factors most guide the choice of a research method?", "o": ["Cost, color, comfort", "Temporal resolution, spatial resolution, invasiveness", "Age, species, budget", "Frequency, voltage, current"], "a": 1, "n": "The chapter names temporal resolution, spatial resolution, and invasiveness as the three factors of primary importance.", "tip": "TSI: Time, Space, Invasiveness.", "w": {"q": "What does temporal resolution refer to?", "o": ["Ability to separate adjacent regions", "Whether tissue is damaged", "The frequency in time of measurements or manipulations", "The cost per participant"], "a": 2, "e": "Temporal resolution is the <b>frequency in time</b> with which measurements or manipulations can be made; spatial resolution instead concerns telling adjacent regions apart."}}]}, {"id": "U5S2", "u": "U5", "ico": "📍", "name": "Single-Unit Recording", "qs": [{"d": 1, "q": "What does single-unit recording directly measure?", "o": ["Blood oxygenation", "Action potentials (firing) of a neuron", "Magnetic fields at the scalp", "Dopamine receptor binding"], "a": 1, "n": "Single-unit recording provides direct information about the rate and timing of action potentials within a region.", "tip": "Single UNIT = single spiking unit.", "w": {"q": "How do neuroscientists index whether a stimulus changed a neuron's processing?", "o": ["By the amplitude of each spike", "By the neuron's color", "By changes in its firing rate", "By the width of the axon"], "a": 2, "e": "Because spikes have a stereotyped amplitude, a larger input raises the <b>firing rate</b>, not the spike shape, so rate is used as the index of changed processing."}}, {"d": 2, "q": "Why are most single-unit neuroeconomics studies done in non-human primates, not humans?", "o": ["Opening the skull is an invasive, risky surgical procedure", "Monkeys make better decisions", "The electrodes damage the brain badly", "Humans lack action potentials"], "a": 0, "n": "The electrode itself causes little damage, but opening the skull to reach the brain is invasive and risky, limiting the technique mainly to animals.", "w": {"q": "When ARE human single-unit recordings possible?", "o": ["In any healthy volunteer", "Only in patients with clinically implanted electrodes (e.g., epilepsy)", "During routine MRI scans", "Never, under any circumstances"], "a": 1, "e": "Rare human studies use patients who already have electrodes implanted for <b>clinical</b> reasons, such as locating epileptic seizure sites."}}, {"d": 3, "q": "What unique insight does single-unit recording give that broader techniques miss?", "o": ["Whole-brain metabolic maps", "Neurotransmitter concentrations", "Diversity of intermixed neuron populations with different response properties", "Millisecond scalp potentials"], "a": 2, "n": "Analyzing single neurons reveals several intermixed populations with qualitatively different responses, which are invisible to methods that average across many neurons.", "w": {"q": "Why is single-unit data called 'single-unit' rather than 'single-neuron'?", "o": ["It records only one trial", "A recorded unit may reflect one or several nearby neurons", "It uses a single electrode always", "It measures a single brain region only"], "a": 1, "e": "It can be hard to separate one neuron from close neighbors, so a 'unit' is a single functional unit that <b>may contain more than one neuron</b>."}}, {"d": 2, "q": "Which is a real LIMITATION of single-unit recording noted in the text?", "o": ["Poor temporal resolution", "Cannot detect action potentials", "Only works with metabolic tracers", "Slow, labor-intensive data collection, usually one region at a time"], "a": 3, "n": "Data collection is slow and serial, studies often cover a single region, and maintaining an animal colony makes it expensive.", "tip": "High resolution, low throughput.", "w": {"q": "Why does covering only one region limit complex-cognition inferences?", "o": ["Complex processes involve interactions among many regions", "One region has no neurons", "Firing rate is meaningless in one region", "It makes temporal resolution worse"], "a": 0, "e": "Most complex cognitive processes involve <b>interactions among sets of brain regions</b>, so single-region data must be complemented by broader-coverage methods like fMRI."}}]}, {"id": "U5S3", "u": "U5", "ico": "🌊", "name": "EEG and MEG", "qs": [{"d": 1, "q": "The EEG signal arises mainly from what?", "o": ["Axonal action potentials of single neurons", "Synchronous membrane-potential changes in dendrites of many neurons", "Blood flow changes", "Radioactive decay"], "a": 1, "n": "EEG reflects synchronous changes in the dendritic membrane potentials of many neighboring neurons that generate coherent electrical potentials.", "tip": "EEG = dendrites in chorus.", "w": {"q": "What are ERPs (event-related potentials)?", "o": ["Oscillations unrelated to any event", "EEG components time-locked to specific stimuli or events", "Magnetic fields from SQUIDs", "Metabolic maps of the brain"], "a": 1, "e": "ERPs are EEG components <b>time-locked</b> to specific stimuli or events, used to study perception, motor preparation, and executive function."}}, {"d": 2, "q": "What is EEG's main strength and its main weakness?", "o": ["Great spatial, poor temporal", "Great at causation, poor at measurement", "Great temporal, poor spatial localization", "Great depth, poor surface access"], "a": 2, "n": "EEG gives non-invasive, high-temporal-resolution access to electrical activity but has imprecise spatial localization.", "tip": "EEG: fast in time, fuzzy in space.", "w": {"q": "What is the 'inverse problem' in EEG?", "o": ["Signals are recorded upside down", "Scalp data could come from infinitely many possible neural sources", "The amplifier reverses polarity", "Time runs backwards in ERPs"], "a": 1, "e": "The <b>inverse problem</b> is that an underspecified scalp signal could be generated by any of an infinite number of source configurations, so sources cannot be uniquely identified."}}, {"d": 1, "q": "MEG measures what physical quantity?", "o": ["Magnetic fields produced by neural electrical currents", "Glucose metabolism", "Blood oxygen level", "Electrode voltage on the scalp"], "a": 0, "n": "MEG uses external sensors to measure the tiny magnetic fields (about 100 femtoTesla) that accompany neuronal electrical currents.", "tip": "M in MEG = Magnetic.", "w": {"q": "What special detectors let MEG sense such weak magnetic fields?", "o": ["Scintillation crystals", "Copper stimulation coils", "SQ const $=id=>document.getElementById(id);
function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function yestStr(){const d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function bumpStreak(){
  const t=todayStr();
  if(S.streak.last===t)return;
  if(S.streak.last===yestStr())S.streak.count++;
  else S.streak.count=1;
  S.streak.last=t; save();
}
function qOf(ref){return TOPICS.find(t=>t.id===ref.t).qs[ref.i];}
function beep(ok){
  if(!S.settings.sound)return;
  try{const a=new (window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
    if(ok){o.frequency.value=660;o.type='sine';g.gain.value=.06;o.start();
      o.frequency.setValueAtTime(660,a.currentTime);o.frequency.setValueAtTime(880,a.currentTime+.1);o.stop(a.currentTime+.22);}
    else{o.frequency.value=180;o.type='square';g.gain.value=.05;o.start();o.stop(a.currentTime+.2);}
  }catch(e){}
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
/* shuffle answer options so the correct one isn't always 'A'. Pin 'All/None of the above' last. */
function shuffleOpts(opts,ansIdx){
  const items=opts.map((t,i)=>({t,orig:i}));
  const pinned=items.filter(x=>/above/i.test(x.t));
  const movable=shuffle(items.filter(x=>!/above/i.test(x.t)));
  const order=movable.concat(pinned);
  return {opts:order.map(x=>x.t),ans:order.findIndex(x=>x.orig===ansIdx)};
}

function renderPath(){
  paintTop();

  const rb=$("resumeBox");
  if(S.session){
    const t=TOPICS.find(x=>x.id===S.session.topicId);
    const nm=S.session.name||(t?t.name:"lesson");
    const prog=Math.round(100*S.session.pos/S.session.order.length);
    rb.innerHTML=`<div class="resume"><div><div class="t">▶ Continue: ${nm}</div><div class="s">${prog}% through — pick up where you left off</div></div>
      <button class="btn green" style="width:auto;padding:12px 18px" onclick="resumeLesson()">Resume</button></div>`;
  } else rb.innerHTML="";
  // units (dynamic)
  const host=$("units");host.innerHTML="";
  UNITS.forEach((U,ui)=>{
    const wrap=document.createElement("div");wrap.className="unit "+U.color;
    wrap.innerHTML=`<div class="unitband"><div><div class="s">UNIT ${ui+1}</div><div class="t">${U.ico} ${U.name}</div></div><div class="g" id="g_${U.key}">0/0 ✓</div></div><div class="path" id="path_${U.key}"></div>`;
    host.appendChild(wrap);
    renderUnit(U,"path_"+U.key,"g_"+U.key);
  });
  // mistakes count
  $("missCount").textContent=(S.mistakes.length||0)+" saved";
}
function renderUnit(U,pid,gid){
  const list=TOPICS.filter(t=>t.u===U.key);
  const doneCount=list.filter(t=>S.skills[t.id].crowns>0).length;
  $(gid).textContent=doneCount+"/"+list.length+" ✓";
  const P=$(pid);P.innerHTML="";
  let firstUndone=list.find(t=>S.skills[t.id].crowns===0);
  list.forEach((t,idx)=>{
    const sk=S.skills[t.id];
    const node=document.createElement("div");node.className="node "+U.color;
    const off=Math.round(58*Math.sin(idx*0.95));
    const isCur=(t===firstUndone);
    const cls=sk.crowns>0?"done":(isCur?"cur":"");
    node.style.transform="translateX("+off+"px)";
    node.innerHTML=`
      ${isCur?'<div class="startflag">START</div>':''}
      <button class="bub ${cls}" onclick="openSkill('${t.id}')">${sk.crowns>0?'👑':t.ico}</button>
      <div class="crowns">${'●'.repeat(sk.crowns)}${'○'.repeat(MAXCROWN-sk.crowns)}</div>
      <div class="nlabel">${t.name}</div>`;
    P.appendChild(node);
  });
}

/* ---- backup / sync ---- */
function exportCode(){
  const data={v:2,xp:S.xp,skills:S.skills,streak:S.streak,mistakes:S.mistakes};
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}
function openBackup(){
  const code=exportCode();
  const ov=document.createElement("div");ov.className="overlay";ov.id="ov";
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="sheet">
    <h3>🔑 Backup / Sync</h3>
    <div class="meta">Copy this code to save your progress or move it to another device. Keep it somewhere safe.</div>
    <textarea id="bkCode" readonly style="width:100%;height:78px;border:2px solid var(--line);border-radius:12px;padding:10px;font-size:11px;font-family:monospace;resize:none">${code}</textarea>
    <button class="btn green" onclick="copyCode()">📋 Copy my backup code</button>
    <div class="meta" style="margin-top:16px">Have a code? Paste it to restore:</div>
    <textarea id="rsCode" placeholder="paste a backup code here…" style="width:100%;height:64px;border:2px solid var(--line);border-radius:12px;padding:10px;font-size:11px;font-family:monospace;resize:none"></textarea>
    <button class="btn blue" onclick="restoreCode()">↺ Restore progress</button>
    <button class="btn ghost" onclick="document.getElementById('ov').remove()">Close</button>
  </div>`;
  document.body.appendChild(ov);
}
function copyCode(){
  const t=document.getElementById('bkCode');t.select();t.setSelectionRange(0,99999);
  try{navigator.clipboard.writeText(t.value);}catch(e){try{document.execCommand('copy');}catch(_){}}
  toast("✅ Backup code copied — paste it somewhere safe.");
}
function restoreCode(){
  const raw=(document.getElementById('rsCode').value||"").trim();
  if(!raw){toast("Paste a code first.");return;}
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(raw))));
    if(typeof data.xp!=="number"||!data.skills)throw new Error("bad");
    S.xp=data.xp;S.skills=data.skills;
    if(data.streak)S.streak=data.streak;
    S.mistakes=data.mistakes||[];
    TOPICS.forEach(t=>{if(!S.skills[t.id])S.skills[t.id]={crowns:0,best:0}});
    save();paintTop();
    const ov=document.getElementById('ov');if(ov)ov.remove();
    goPath();toast("✅ Progress restored!");
  }catch(e){toast("That code didn't work — make sure you copied all of it.");}
}

/* =================== LESSON =================== */
function startLesson(id){
  const t=TOPICS.find(x=>x.id===id);
  const order=t.qs.map((q,i)=>({t:id,i}));
  L={topicId:id,name:t.name,unit:t.u,order,pos:0,stage:1,picked:null,score:0,
     correctCount:0,missed:[],mode:"skill",heartsOn:S.settings.hearts};
  _sessionHearts=L.heartsOn?MAXHEART:null;
  persistSession();
  openLessonUI();renderQ();
}
function startExam(){
  let pool=[];TOPICS.forEach(t=>t.qs.forEach((q,i)=>pool.push({t:t.id,i})));
  const order=shuffle(pool).slice(0,12).sort((a,b)=>qOf(a).d-qOf(b).d);
  L={topicId:"__exam",name:"📝 Mock Exam",unit:"E",order,pos:0,stage:1,picked:null,score:0,
     correctCount:0,missed:[],mode:"exam",heartsOn:S.settings.hearts};
  _sessionHearts=L.heartsOn?MAXHEART:null;persistSession();openLessonUI();renderQ();
}
function startMistakes(){
  if(!S.mistakes.length){toast("No mistakes saved — go get some questions wrong first! 😄");return;}
  const order=shuffle(S.mistakes.slice());
  L={topicId:"__miss",name:"🩹 Practice Mistakes",unit:"M",order,pos:0,stage:1,picked:null,score:0,
     correctCount:0,missed:[],mode:"mistakes",heartsOn:false};
  _sessionHearts=null;persistSession();openLessonUI();renderQ();
}
function openLessonUI(){
  $("path").classList.add("hide");$("done").classList.add("hide");$("flash").classList.add("hide");
  $("topbar").classList.add("hide");$("lesson").classList.remove("hide");
}
function persistSession(){
  if(!L){S.session=null;save();return;}
  S.session={topicId:L.topicId,name:L.name,unit:L.unit,order:L.order,pos:L.pos,stage:L.stage,
    score:L.score,correctCount:L.correctCount,missed:L.missed,mode:L.mode,heartsOn:L.heartsOn,hearts:_sessionHearts};
  save();
}
function resumeLesson(){
  const s=S.session;if(!s)return;
  L={topicId:s.topicId,name:s.name,unit:s.unit,order:s.order,pos:s.pos,stage:1,picked:null,
     score:s.score,correctCount:s.correctCount,missed:s.missed||[],mode:s.mode,heartsOn:s.heartsOn};
  _sessionHearts=s.heartsOn?(s.hearts==null?MAXHEART:s.hearts):null;
  openLessonUI();renderQ();
}
function lessonProgress(){return Math.round(100*L.pos/L.order.length);}
function renderHeartsUI(){
  const h=$("lhearts");
  if(L.heartsOn){h.classList.remove("hide");h.innerHTML="❤️ "+_sessionHearts;}
  else h.classList.add("hide");
}
function renderQ(){
  L.stage=1;L.picked=null;L.answered=false;_isWhy=false;
  $("pbar").style.width=lessonProgress()+"%";
  renderHeartsUI();
  const q=qOf(L.order[L.pos]);
  $("lbody").innerHTML=`
    <div class="stageTag">Stage 1 · Choose the answer<span class="diffbadge">${'★'.repeat(q.d)}${'☆'.repeat(5-q.d)}</span></div>
    <div class="qtitle">${q.q}</div>
    <div id="choices"></div>`;
  L.s1=shuffleOpts(q.o,q.a);
  renderChoices(L.s1.opts,false);
  $("fsheet").innerHTML="";$("fsheet").className="";
  setCheck("Check","grey",true);
}
function renderChoices(opts,isWhy){
  const c=$("choices");c.innerHTML="";
  opts.forEach((txt,i)=>{
    const b=document.createElement("button");b.className="choice";
    b.innerHTML=`<span class="k">${"ABCD"[i]}</span><span>${txt}</span>`;
    b.onclick=()=>selectChoice(i,isWhy,b);
    c.appendChild(b);
  });
}
function selectChoice(i,isWhy,btn){
  if(L.answered)return;
  L.picked=i;
  [...$("choices").children].forEach(x=>x.classList.remove("sel"));
  btn.classList.add("sel");
  setCheck("Check",isWhy?"blue":"green",false);
}
function setCheck(label,color,disabled){
  const b=$("checkbtn");b.textContent=label;b.className="checkbtn "+color;b.disabled=!!disabled;
  b.onclick=disabled?null:onCheck;
}
let _isWhy=false;
function onCheck(){
  const q=qOf(L.order[L.pos]);
  if(!_isWhy) gradeStage1(q); else gradeStage2(q);
}
function gradeStage1(q){
  if(L.picked==null)return;
  L.answered=true;
  const correct=(L.picked===L.s1.ans);
  revealChoices(L.s1.ans,L.picked);
  if(correct){L.score+=10;S.xp+=10;floatXp("+10");beep(true);}
  else{
    beep(false);
    if(!L.missed.some(m=>m.t===L.order[L.pos].t&&m.i===L.order[L.pos].i))L.missed.push(L.order[L.pos]);
    addMistake(L.order[L.pos]);
    if(L.heartsOn){_sessionHearts--;renderHeartsUI();}
  }
  save();paintTop();
  showFeedback(correct, correct?"Correct!":"Answer: "+"ABCD"[L.s1.ans], q.n, null);
  // continue -> why stage
  _isWhy=false;
  setCheckFeedback(correct, ()=>renderWhy());
  if(L.heartsOn&&_sessionHearts<=0){ setTimeout(()=>outOfHearts(),300); }
}
function renderWhy(){
  L.answered=false;L.stage=2;L.picked=null;_isWhy=true;
  persistSession();
  const q=qOf(L.order[L.pos]);
  $("lbody").innerHTML=`
    <div class="stageTag why">Stage 2 · Understand WHY</div>
    <div class="qtitle">${q.w.q}</div>
    <div id="choices"></div>`;
  L.s2=shuffleOpts(q.w.o,q.w.a);
  renderChoices(L.s2.opts,true);
  $("fsheet").innerHTML="";$("fsheet").className="";
  setCheck("Check","grey",true);
}
function gradeStage2(q){
  if(L.picked==null)return;
  L.answered=true;
  const correct=(L.picked===L.s2.ans);
  revealChoices(L.s2.ans,L.picked);
  if(correct){L.score+=5;S.xp+=5;floatXp("+5");beep(true);L.correctCount++;}
  else beep(false);
  save();paintTop();
  const tip=q.tip?('🧠 Remember: '+q.tip):null;
  showFeedback(correct, correct?"Exactly! +5":"Here's the idea", q.w.e, tip);
  setCheckFeedback(correct, ()=>nextQ());
}
function revealChoices(ans,picked){
  [...$("choices").children].forEach((x,idx)=>{
    x.disabled=true;x.classList.remove("sel");
    if(idx===ans)x.classList.add("ok");
    if(idx===picked&&picked!==ans)x.classList.add("no");
  });
}
function showFeedback(good,title,body,tip){
  const f=$("fsheet");
  f.className="fsheet "+(good?"good":"bad");
  f.innerHTML=`<div class="frow"><div class="fmark">${good?'✓':'✕'}</div><div class="fttl">${title}</div></div>
    <div class="fexp">${body}</div>${tip?`<div class="ftip">${tip}</div>`:""}`;
}
function setCheckFeedback(good,next){
  const bar=$("btnbar");bar.className="btnbar "+(good?"good":"bad");
  const b=$("checkbtn");b.textContent="Continue";b.className="checkbtn "+(good?"green":"red");
  b.disabled=false;b.onclick=()=>{bar.className="btnbar";next();};
}
function nextQ(){
  L.pos++;L.answered=false;
  if(L.pos>=L.order.length)return finishLesson();
  persistSession();
  renderQ();
}
function outOfHearts(){
  $("lbody").innerHTML=`<div style="text-align:center;padding:40px 10px">
    <div style="font-size:60px">💔</div>
    <h2 style="color:var(--red)">Out of hearts!</h2>
    <p class="mut">You ran out — but this is a study tool, so refill and keep going. Mistakes are saved to practise later.</p></div>`;
  $("fsheet").innerHTML="";$("fsheet").className="";
  const bar=$("btnbar");bar.className="btnbar";
  $("checkbtn").outerHTML=`<button class="checkbtn red" onclick="refillContinue()">Refill ❤️ & continue</button>`;
}
function refillContinue(){
  _sessionHearts=MAXHEART;persistSession();
  $("btnbar").innerHTML=`<button class="checkbtn grey" id="checkbtn" disabled>Check</button>`;
  // continue from where we were: if we were mid (answered stage1), move on
  if(L.pos>=L.order.length)finishLesson(); else renderQ();
}
function exitLesson(){
  // save session for resume, then go home
  persistSession();
  L=null;
  $("lesson").classList.add("hide");$("topbar").classList.remove("hide");$("path").classList.remove("hide");
  renderPath();
}
function finishLesson(){
  const id=L.topicId;
  const total=L.order.length;
  const acc=Math.round(100*L.correctCount/total);
  // crown / best for skill mode
  let leveledUp=false;
  if(L.mode==="skill"){
    const sk=S.skills[id];
    if(L.score>sk.best)sk.best=L.score;
    if(sk.crowns<MAXCROWN){sk.crowns++;leveledUp=true;}
  }
  if(L.mode==="mistakes"){
    // remove the ones answered correctly in stage 2 from mistakes pool
    L.order.forEach(ref=>{ if(!L.missed.some(m=>m.t===ref.t&&m.i===ref.i)) removeMistake(ref); });
  }
  bumpStreak();
  S.session=null;save();paintTop();
  // celebrate
  burstConfetti();
  $("lesson").classList.add("hide");$("topbar").classList.remove("hide");
  $("doneIco").textContent=acc>=80?"🏆":acc>=50?"🎉":"📚";
  $("doneTtl").textContent=L.mode==="exam"?"Mock exam done!":leveledUp?"Level up! 👑":"Lesson complete!";
  $("doneSub").textContent=L.mode==="mistakes"?"Nice — correct ones cleared from your mistakes list.":
     (acc>=80?"You really know this.":acc>=50?"Solid — replay to lock it in.":"Keep going — replay to raise your score.");
  $("doneStats").innerHTML=`
    <div class="scard g"><div class="h">XP</div><div class="v">+${L.score}</div></div>
    <div class="scard b"><div class="h">Accuracy</div><div class="v">${acc}%</div></div>
    <div class="scard r"><div class="h">Streak</div><div class="v">🔥${S.streak.count}</div></div>`;
  let btns=`<button class="btn green" onclick="goPath()">Continue</button>`;
  if(L.missed.length) btns+=`<button class="btn gold" onclick="practiceThese()">Practice ${L.missed.length} mistake${L.missed.length>1?'s':''}</button>`;
  btns+=`<button class="btn ghost" onclick="retryLesson('${id}','${L.mode}')">Retry lesson</button>`;
  $("doneBtns").innerHTML=btns;
  $("done").classList.remove("hide");
  _lastMode=L.mode;_lastMissed=L.missed.slice();L=null;
}
let _lastMode="skill",_lastMissed=[];
function retryLesson(id,mode){
  $("done").classList.add("hide");
  if(mode==="exam")startExam();
  else if(mode==="mistakes")startMistakes();
  else startLesson(id);
}
function practiceThese(){
  const order=shuffle(_lastMissed.slice());
  if(!order.length)return goPath();
  $("done").classList.add("hide");
  L={topicId:"__retry",name:"🩹 Practice mistakes",unit:"M",order,pos:0,stage:1,picked:null,score:0,
     correctCount:0,missed:[],mode:"mistakes",heartsOn:false};
  _sessionHearts=null;openLessonUI();renderQ();
}
function goPath(){
  $("done").classList.add("hide");$("flash").classList.add("hide");$("lesson").classList.add("hide");
  $("topbar").classList.remove("hide");$("path").classList.remove("hide");renderPath();
}

/* mistakes pool */
function addMistake(ref){ if(!S.mistakes.some(m=>m.t===ref.t&&m.i===ref.i)){S.mistakes.push({t:ref.t,i:ref.i});save();} }
function removeMistake(ref){ S.mistakes=S.mistakes.filter(m=>!(m.t===ref.t&&m.i===ref.i));save(); }

/* =================== FLASHCARDS =================== */
let fcOrder=[],fcI=0,fcFlip=false;
function startFlash(){
  fcOrder=shuffle([...Array(CARDS.length).keys()]);fcI=0;
  $("path").classList.add("hide");$("topbar").classList.add("hide");$("flash").classList.remove("hide");
  paintFC();
}
function paintFC(){
  fcFlip=false;$("fcIn").classList.remove("flip");
  const c=CARDS[fcOrder[fcI]];$("fcT").textContent=c[0];$("fcD").textContent=c[1];
  $("fcCount").textContent=(fcI+1)+" / "+CARDS.length;
  $("fcBar").style.width=Math.round(100*(fcI+1)/CARDS.length)+"%";
}
function flip(){fcFlip=!fcFlip;$("fcIn").classList.toggle("flip",fcFlip);}
function fcNext(){ if(fcI+1>=CARDS.length){toast("Flashcards complete! 🎉");goPath();return;} fcI++;paintFC(); }

/* =================== EFFECTS =================== */
function floatXp(txt){
  const el=document.createElement("div");el.className="floatxp";el.textContent=txt;
  el.style.left=(window.innerWidth/2-10)+"px";el.style.top="120px";
  document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
}
function burstConfetti(){
  const em=["🎉","✨","⭐","👑","💎","🟦","🟧"];
  for(let i=0;i<28;i++){
    const c=document.createElement("div");c.className="confetti";c.textContent=em[i%em.length];
    c.style.left=Math.random()*100+"vw";c.style.animationDelay=(Math.random()*0.5)+"s";
    c.style.fontSize=(14+Math.random()*16)+"px";
    document.body.appendChild(c);setTimeout(()=>c.remove(),2600);
  }
}
function toast(msg){
  const t=document.createElement("div");t.textContent=msg;
  t.style.cssText="position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#131f3a;color:#fff;font-weight:800;padding:12px 18px;border-radius:14px;z-index:70;max-width:90%;text-align:center;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3)";
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);
}

/* =================== MISC =================== */
function resetAll(){
  if(confirm("Reset ALL progress, XP, streak and crowns?")){
    localStorage.removeItem(LS);S=load();initState();_sessionHearts=null;goPath();
  }
}

/* boot */
goPath();
</script>
